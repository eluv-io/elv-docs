name: policy nft-owner-or-admin v1.3
desc: |
  Contract policy for access control based on NFT ownership, with access also granted to tenant
  and content administrators. The policy permits any read operation if the user owns a
  non-fungible token governed by a linked ERC-721 smart contract, or is a member of the
  tenant_admin or content_admin blockchain group.  This is confirmed either by isOwnerOfLinkedNft
  checking on-chain assets, or, by hasAssetClaimForLinkedNft accepting an embedded, authority-signed
  entitlement bridge claim (ctx[elv:asset_claims]) asserting pending ownership.

  Entry point is 'authorize' for CSAT compatibility in addition to ESAT and state channel.
type: ast
expr:
  rule: authorize
rules:

  settings:
    literal:
      authorized_asset_claims_signers:
        - "0x0000000000000000000000000000000000000001"

  authorize:
    or:
      - rule: isAdminUser
      - rule: main

  main:
    or:
      - fn.isOwnerOfLinkedNft:
          - env: call/subject
      - fn.hasAssetClaimForLinkedNft:
      - and:
          - eq:
              - env: api_call/action
              - q.read.decrypt
          - fn.ids.Equivalent:
              - env: call/node_id
              - env: call/subject

  isAdminUser:
    or:
      - func: userIsTenantAdmin
      - func: userIsContentAdmin
