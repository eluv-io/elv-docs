name: policy nft-owner-geo-admin v1.0
desc: |
  Contract policy combining geo restriction with NFT ownership and admin access.

  Admins (tenant_admin or content_admin group members) are allowed from any geography.
  All other users must pass the geo check AND own a qualifying NFT.

  The authorize rule is structured so that:
    - isAdminUser is checked first; if it passes, geo and NFT checks are skipped entirely.
    - For non-admins, isAllowedRegion runs first in an 'and' before any blockchain
      calls. If geo blocks, the and short-circuits before isOwnerOfLinkedNft runs.

  This produces distinct trace patterns for error classification on non-admin failures:
    geo blocked:          ipGeoLocationProps present, isOwnerOfLinkedNft absent
    geo passes, NFT fails: both ipGeoLocationProps and isOwnerOfLinkedNft present

  Entry point is named 'authorize' for CSAT compatibility.
  isValidTokenSigner is omitted: admin and NFT checks are on-chain trust anchors.
  Customize blockedCountryCodes for your deployment.
type: ast
expr:
  rule: authorize
rules:

  settings:
    literal:
      blockedCountryCodes:
        - "US"

  # Admins bypass geo entirely. Non-admins must pass geo before any blockchain calls.
  authorize:
    or:
      - rule: isAdminUser
      - and:
          - rule: isAllowedRegion
          - rule: main

  isAllowedRegion:
    not:
      in:
        - fn.ipGeoLocationProps:
            - "country_code"
        - rule: settings/blockedCountryCodes

  # uses runtime-injected environment functions
  isAdminUser:
    or:
      - func: userIsTenantAdmin
      - func: userIsContentAdmin

  # isOwnerOfLinkedNft propagates errors rather than returning false if the NFT
  # contract is missing or invalid, so it runs after isAdminUser.
  main:
    or:
      - fn.isOwnerOfLinkedNft:
          - env: call/subject
      - and:
          - eq:
              - env: api_call/action
              - q.read.decrypt
          - fn.ids.Equivalent:
              - env: call/node_id
              - env: call/subject
