name: policy nft-owner-geo-admin v1.0
desc: |
  Contract policy combining geo restriction with NFT ownership and admin access.
  Permits any read operation if:
    - the user's IP is in the allowed region, AND
    - the user owns a non-fungible token governed by a linked ERC-721 smart contract,
      or is a member of the tenant_admin or content_admin blockchain group.

  isAllowedRegion runs first in an 'and'. If geo blocks, the and short-circuits before
  the NFT/admin check runs. This produces distinct trace patterns that allow callers to
  distinguish the failure reason:
    geo blocked:          ipGeoLocationProps present, isOwnerOfLinkedNft absent
    geo passes, NFT fails: both ipGeoLocationProps and isOwnerOfLinkedNft present

  Entry point is named 'authorize' so the policy accepts client-signed tokens (CSATs)
  in addition to editor-signed and state channel tokens.

  isValidTokenSigner is omitted: admin and NFT checks are on-chain trust anchors.
  The blocked country list should be customized per deployment.
type: ast
expr:
  rule: authorize
rules:

  # Entry point for CSATs; also used by ESAT/state channel tokens.
  # isAllowedRegion runs first so that geo failures short-circuit before any
  # blockchain calls (isOwnerOfLinkedNft) are made.
  authorize:
    and:
      - rule: isAllowedRegion
      - or:
          - rule: isAdminUser
          - rule: main

  # Customize the country code list for your deployment.
  isAllowedRegion:
    not:
      in:
        - fn.ipGeoLocationProps:
            - "country_code"
        - - "US"

  # uses runtime-injected environment functions
  isAdminUser:
    or:
      - func: userIsTenantAdmin
      - func: userIsContentAdmin

  # isAdminUser runs before main: fn.isOwnerOfLinkedNft propagates errors rather
  # than returning false if the NFT contract is missing or invalid.
  main:
    or:
      - fn.isOwnerOfLinkedNft:
          - env: call/subject
      - and:
          - eq:
              - env: api_call/action
              - q.read.decrypt
          - fn.ids.Equivalent:
              - env: call/node_id
              - env: call/subject
