name: Allowed users and decrypt with nodeId v1.0
desc: |
  Sample policy for plain tokens that checks the user who signed the token
  belongs to permitted users or the token subject contains node_id

  Changelog:
  v1.0
    * add isNodeIdReadDecrypt to allowed_users_policy.yaml

type: ast
expr:
  rule: main
rules:

  main:
    or:
      - rule: permittedUsers
      - rule: isNodeIdReadDecrypt
              
  permittedUsers:
    in:
      - env: call/subject
      - - "iusr2eSw8JYBroWi4EgT3gU723Ky8wHi"
  
  isNodeIdReadDecrypt:
    and:
      - eq:
          - env: api_call/action
          - q.read.decrypt
      - fn.ids.Equivalent:
          - env: call/node_id
          - env: call/subject
      


